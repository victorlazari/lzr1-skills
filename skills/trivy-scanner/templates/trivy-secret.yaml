# trivy-secret.yaml - Custom Secret Scanning Rules Template
# Place this file in the root of your repository.
# Trivy will automatically load it, or specify with --secret-config flag.
# Documentation: https://trivy.dev/docs/latest/scanner/secret/

# ─── Custom Rules ────────────────────────────────────────────────────────────
# Define additional secret detection patterns beyond built-in rules.
rules:
  - id: custom-internal-api-key
    category: internal
    title: Internal API Key
    severity: HIGH
    regex: '(?i)(?:internal[_-]?api[_-]?key)\s*[:=]\s*["\x27]?([a-zA-Z0-9_\-]{32,})["\x27]?'
    keywords:
      - internal_api_key
      - internal-api-key
    path: '.*\.(yaml|yml|json|env|properties|conf|cfg|ini|toml)$'

  - id: custom-database-url
    category: database
    title: Database Connection String
    severity: CRITICAL
    regex: '(?i)(postgres|mysql|mongodb|redis)://[^\s"''`]+:[^\s"''`]+@[^\s"''`]+'
    keywords:
      - postgres://
      - mysql://
      - mongodb://
      - redis://

  - id: custom-jwt-secret
    category: authentication
    title: JWT Secret Key
    severity: HIGH
    regex: '(?i)(?:jwt[_-]?secret|jwt[_-]?key)\s*[:=]\s*["\x27]?([^\s"'']{16,})["\x27]?'
    keywords:
      - jwt_secret
      - jwt-secret
      - jwt_key
      - jwt-key

# ─── Allow Rules ─────────────────────────────────────────────────────────────
# Suppress false positives by defining patterns that should be ignored.
allow-rules:
  - id: allow-example-values
    description: Allow example/placeholder values
    regex: '(?i)(example|placeholder|changeme|your[_-]?key[_-]?here|xxx+|dummy)'

  - id: allow-test-fixtures
    description: Allow secrets in test fixture directories
    path: '(?i)(test|spec|fixture|mock|fake|stub|__test__|_test\.go).*'

  - id: allow-documentation
    description: Allow secrets in documentation files
    path: '.*\.(md|rst|adoc|txt)$'

  - id: allow-lock-files
    description: Allow hashes in lock files
    path: '.*\.(lock|sum)$'

# ─── Disable Built-in Allow Rules ────────────────────────────────────────────
# Uncomment to disable specific built-in allow rules for stricter scanning.
# disable-allow-rules:
#   - builtin-allow-rule-id
